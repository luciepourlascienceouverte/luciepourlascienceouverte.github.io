<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:#060a1e;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Space Mono',monospace;color:#fff;overflow:hidden;padding:12px}

  <style>

  #rotate-msg canvas#phoneCanvas{image-rendering:pixelated;image-rendering:crisp-edges;}
  @media(max-width:960px){#wrap{width:100vw;max-width:100%;}}

    html,body{padding:0;margin:0;min-height:unset;height:100dvh;justify-content:flex-start;}

    canvas#c{border-radius:0;width:100vw;height:100dvh;display:block;}
    p.hint{display:none;}
  }
  @media(orientation:portrait){#rotate-msg{display:flex}#wrap,p.hint{display:none}}
  </style>

// ── Tooltip system ─────────────────────────────────────────────
let seen={};
function resetSeen(){seen={pub:0,arch:0,oa:0,goa:0,cou:0,ccby:0,ccnd:0,crow:0,oapc:0};}
const TIP={
  pub: {name:'Éditeur prédateur', text:'−1 article / −30 lecteurs',    col:'#f87171'},
  arch:{name:'Archive ouverte',   text:'+1 article / +50 lecteurs',     col:'#86efac'},
  oa:  {name:'Éditeur OA',        text:'+1 article / +50 lecteurs',     col:'#86efac'},
  goa: {name:'Green OA',          text:'+1 article / +25 lecteurs',     col:'#86efac'},
  cou: {name:'Couperin',          text:'+1 article / bouclier 2s',       col:'#86efac'},
  ccby:{name:null,                          text:'+25% lecteurs',          col:'#86efac'},
  ccnd:{name:null,                          text:'−25% lecteurs',          col:'#f87171'},
  crow:{name:null,                text:'+10 lecteurs / + de monstres…',  col:'#fde047'},
};
function tryTip(type, x, y){
  seen[type]=(seen[type]||0)+1;
  const d=TIP[type];
  tooltips.push({name:d.name, text:d.text, col:d.col, x, y, life:1, vy:-50});
}
function tryTipOAPC(x, y){
  seen['oapc']=(seen['oapc']||0)+1;
  tooltips.push({
    name:'Éditeur OA + APC', text:'+1 article / +50 lecteurs', col:'#86efac',
    line3:'7s : archives, éditeurs OA et Green OA absents', col3:'#f87171',
    line4:'+ de monstres', col4:'#f87171',
    x, y, life:1, vy:-45
  });
}
function tryTipOA(ccKey, x, y){
  const oaKey='oa';
  seen[oaKey]=(seen[oaKey]||0)+1;
  const oaText = '+1 article / +50 lecteurs';
  const ccLabel = ccKey==='ccby' ? 'CC BY  +25 lecteurs / bouclier 5s'
                : ccKey==='ccnd' ? 'CC BY-NC-ND  −20 lecteurs'
                : null;
  const ccCol = ccKey==='ccby' ? '#86efac' : '#f87171';
  tooltips.push({
    name:'Éditeur OA', text:oaText, col:TIP.oa.col,
    line3:ccLabel, col3:ccCol,
    x, y, life:1, vy:-45
  });
}
function drawTooltips(dt){
  tooltips.forEach(t=>{
    t.y += t.vy*dt;
    t.life -= dt/2.2;
    if(t.life<=0) return;
    const alpha=Math.min(1, t.life*3.5);
    cx.save();
    cx.globalAlpha=alpha;
    cx.textAlign='center';
    if(t.name){
      cx.font=`bold 10px 'Space Mono', monospace`;
      cx.fillStyle='rgba(0,0,0,0.6)'; cx.fillText(t.name, t.x+1, t.y+1);
      cx.fillStyle='rgba(255,255,255,0.9)'; cx.fillText(t.name, t.x, t.y);
      cx.font=`bold 11px 'Space Mono', monospace`;
      cx.fillStyle='rgba(0,0,0,0.6)'; cx.fillText(t.text, t.x+1, t.y+15);
      cx.fillStyle=t.col; cx.fillText(t.text, t.x, t.y+14);
      if(t.line3){
        cx.fillStyle='rgba(0,0,0,0.6)'; cx.fillText(t.line3, t.x+1, t.y+29);
        cx.fillStyle=t.col3; cx.fillText(t.line3, t.x, t.y+28);
      }
      if(t.line4){
        cx.fillStyle='rgba(0,0,0,0.6)'; cx.fillText(t.line4, t.x+1, t.y+43);
        cx.fillStyle=t.col4; cx.fillText(t.line4, t.x, t.y+42);
      }
    } else {
      cx.font=`bold 11px 'Space Mono', monospace`;
      cx.fillStyle='rgba(0,0,0,0.6)';
      cx.fillText(t.text, t.x+1, t.y+1);
      cx.fillStyle=t.col;
      cx.fillText(t.text, t.x, t.y);
    }
    cx.restore();
  });
  tooltips=tooltips.filter(t=>t.life>0);
}

function tutorialDone(){
  return ['pub','arch','oa','oapc','goa','cou','ccby','ccnd'].every(k=>(seen[k]||0)>=9);
}
function tutorialOnce(){
  return ['pub','arch','oa','goa','cou'].every(k=>(seen[k]||0)>=1);
}
function lastElementX(){
  // x du dernier élément spawné (obstacle ou pickup) encore visible
  let x=-Infinity;
  obstacles.forEach(o=>{if(o.x>x)x=o.x;});
  pickups.forEach(p=>{if(p.x>x)x=p.x;});
  return x;
}

function mkStars(){
  stars=Array.from({length:90},()=>({
    x:Math.random()*W,y:Math.random()*(GY-10),
    r:Math.random()*1.4+0.3,a:Math.random()*0.5+0.15,
    tw:Math.random()*Math.PI*2,ts:Math.random()*1.2+0.3}));
}

// ── Input ─────────────────────────────────────────────────────
function doJump(){
  if(mode==='intro'){mode='start';return;}
  if(mode==='start'){startGame();return;}
  if(mode==='over'){replayFromOver();return;}
  if(P.jLeft>0){
    P.depT=0; // saut interrompt l'animation de dépôt
    P.vy=-490;P.jLeft--;P.glow=true;P.glowT=0.18;
  }
}

// ── Collision ─────────────────────────────────────────────────
function hit(a,bx,by,bw,bh){
  const sx=LW*a.sc*.2,sy=LH*a.sc*.15;
  const ax=a.x+sx,ay=a.y+sy,aw=LW*a.sc-sx*2,ah=LH*a.sc-sy*2;
  return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;
}

// ── Animate frame ─────────────────────────────────────────────
function animFrame(obj,keys,dt){
  const spd2=obj.d?obj.d.speed:8;
  obj.ftick+=dt;
  if(obj.ftick>1/spd2){obj.ftick=0;obj.fr=(obj.fr+1)%keys.length;}
  return keys[obj.fr];
}

// ── Update ────────────────────────────────────────────────────
let lastT=0,lastDt=0,introFr=0,introT=0,shieldFr=0,shieldTick=0,boaFr=0,boaTick=0,hudFr=0,hudTick=0,eyeT=0,eyeFr=0,phoneFr=0,phoneTick=0;
function update(ts){
  if(!lastT)lastT=ts;
  const dt=Math.min((ts-lastT)/1000,.05);lastT=ts;lastDt=dt;
  stars.forEach(s=>s.tw+=dt*s.ts);
  // Intro animation update
  if(mode==='intro'){
    introT+=dt;
    if(introFr<11){
      if(introT>0.07){introT=0;introFr++;}
    } else {
      // introT counts hold time on last frame; slogan fades in over 1.5s
      if(introT>3.0){mode='start';}
    }
    return;
  }
  if(mode!=='play')return;

  spd=Math.min(480,180+P.articlesTotal*.9+120);
  spawnGap=Math.max(1.8,2.8-score*.005);

  // Physics
  P.vy+=1350*dt;P.y+=P.vy*dt;
  const floorY=GY-LH*P.sc;
  if(P.y>=floorY){P.y=floorY;P.vy=0;P.jLeft=2;}

  // Scale smooth
  P.sc+=(P.scT-P.sc)*dt*6;
  if(Math.abs(P.sc-P.scT)<.01)P.sc=P.scT;

  // Timers
  if(P.glowT>0){P.glowT-=dt;if(P.glowT<=0)P.glow=false;}
  if(P.immune){P.immT-=dt;if(P.immT<=0)P.immune=false;}
  if(P.resist){P.resistT-=dt;if(P.resistT<=0)P.resist=false;}
  if(P.crowDepT>0){P.crowDepT-=dt;P.crowDepFr=Math.min(4,Math.floor((1-P.crowDepT/0.8)*5));}
  if(P.hitFlash>0)P.hitFlash-=dt;
  if(P.depT>0){if(P.apcBlock){P.depT=0;}else{P.depT-=dt;P.depFrame=Math.floor((1-P.depT)*5);}}
  if(P.crowSurge>0) P.crowSurge-=dt;
  if(P.apcBlock){P.apcT-=dt;if(P.apcT<=0){P.apcBlock=false;P.apcSurge=8;}}
  if(P.apcSurge>0) P.apcSurge-=dt;
  if(P.crowSurge>0) P.crowSurge-=dt;
  shieldTick+=dt; if(shieldTick>1/8){shieldTick=0;shieldFr=(shieldFr+1)%4;}
  boaTick+=dt; if(boaTick>1/8){boaTick=0;boaFr=(boaFr+1)%4;}
  hudTick+=dt; if(hudTick>1/6){hudTick=0;hudFr=(hudFr+1)%4;}
  // Oeil : cligne toutes les 3s
  eyeT+=dt;
  if(eyeT<3){eyeFr=0;}            // open
  else if(eyeT<3.08){eyeFr=1;}    // half-close
  else if(eyeT<3.16){eyeFr=2;}    // closed
  else if(eyeT<3.24){eyeFr=1;}    // half-open
  else{eyeFr=0;eyeT=0;}           // reset

  // Run anim
  if(P.y>=floorY-2&&P.depT<=0&&P.hitFlash<=0){
    P.rTick+=dt;if(P.rTick>.11){P.rFrame=(P.rFrame+1)%4;P.rTick=0;}
  }
  // Hit anim
  if(P.hitFlash>0){P.hitTick+=dt;if(P.hitTick>.1){P.hitFrame=(P.hitFrame+1)%2;P.hitTick=0;}}

  const mv=spd*dt;
  obstacles.forEach(o=>{o.x-=mv;o.t+=dt;});
  pickups.forEach(p=>{p.x-=mv;p.t+=dt;});
  badges.forEach(b=>{b.x-=mv;b.t+=dt;});
  // Crow AI — comes from RIGHT flying LEFT, grabs article, turns back RIGHT
  const crowSpd = spd*0.6+160;
  crows.forEach(cr=>{
    cr.ftick+=dt;
    if(cr.ftick>1/8){cr.ftick=0;cr.fr=(cr.fr+1)%2;}
    if(cr.phase==='approach'){
      cr.x -= crowSpd*dt; // fly left toward Lucie
      if(!cr.grabbed && cr.x < P.x+LW*P.sc && cr.x+cr.w > P.x){
        // Luciee doit sauter pour donner l'article au corbeau :
        // elle doit être en l'air ET à portée verticale du corbeau
        const luciMidY = P.y + LH*P.sc*0.5;
        const crowMidY = cr.y + cr.h*0.5;
        const airborne = P.y < GY - LH*P.sc - 5;
        const inRange  = Math.abs(luciMidY - crowMidY) < 70;
        if(airborne && inRange){
        cr.grabbed=true; cr.phase='retreat';
        score+=10;
        tryTip('crow',P.x+LW/2,P.y-14);
        P.crowDepT=0.8; P.crowDepFr=0; P.crowSurge=5;
        }
      }
    } else {
      cr.x += crowSpd*dt; // fly right, away from Lucie
    }
  });
  crows=crows.filter(cr=>cr.x>-CRW*2&&cr.x<W+200);

  obstacles=obstacles.filter(o=>o.x+o.w>-20);
  pickups=pickups.filter(p=>p.x+p.w>-20);
  badges=badges.filter(b=>b.x+b.w>-20);

  // Independent spawn timers for better distribution
  const minGap = tutorialDone() ? 0 : 120;
  // Pendant APC : monstres plus fréquents
  const obstGap = P.apcBlock     ? spawnGap*0.57
                : P.apcSurge>0   ? spawnGap*0.70
                : P.crowSurge>0  ? spawnGap*0.72
                : tutorialDone() ? spawnGap : spawnGap*0.65;
  P._obstT=(P._obstT||0)+dt;
  if(P._obstT>obstGap){
    P._obstT=0;
    if(lastElementX()<W-minGap) spawnObstacle();
  }
  const pkupGap = tutorialDone() ? spawnGap*2.2+Math.random()*1.4 : spawnGap*0.9+Math.random()*0.5;
  P._pkupT=(P._pkupT||0)+dt;
  if(P._pkupT>pkupGap){
    P._pkupT=0;
    if(lastElementX()<W-minGap) spawnPickup();
  }
  const crowGap = tutorialDone() ? 18+Math.random()*12 : 22+Math.random()*12;
  P._crowT=(P._crowT||0)+dt; if(P._crowT>crowGap){P._crowT=0;spawnCrow();}

  // Collisions
  if(!P.immune){
    for(let i=obstacles.length-1;i>=0;i--){
      const o=obstacles[i];
      if(hit(P,o.x,o.y,o.w,o.h)){
        obstacles.splice(i,1);
        P.lives=Math.max(0,P.lives-1);score=Math.max(0,score-30);
        tryTip('pub', P.x+LW/2, P.y-10);
        P.hitFlash=.5;P.hitFrame=0;P.hitTick=0;
        
        if(P.lives<=0){endGame();return;}
      }
    }
  }
  for(let i=pickups.length-1;i>=0;i--){
    const p=pickups[i];
    if(hit(P,p.x,p.y,p.w,p.h)){
      let consume=true;
      if(p.type==='arch'){
        if(!P.apcBlock){if(P.lives<P.maxLives)P.lives++;P.articlesTotal++;score+=50;P.depT=1.0;tryTip('arch',p.x+p.w/2,p.y-10)}
        else consume=false;
      }
      else if(p.type==='oa'){
        if(P.apcBlock){consume=false;}
        else{
          const nearBadge=badges.find(b=>Math.abs(b.x-(p.x+(OW-BW)/2))<OW*2);
          const ccType=nearBadge?nearBadge.type:p.badgeType;
          badges=badges.filter(b=>b!==nearBadge);
          if(P.lives<P.maxLives)P.lives++;P.articlesTotal++;
          score+=50;
          if(ccType==='ccby'){score+=25;P.immune=true;P.immT=Math.min(10,P.immT+5);P.shieldType='oa';}
          else if(ccType==='ccnd'){score=Math.max(0,score-20);}
          P.depT=1.0;tryTipOA(ccType,p.x+p.w/2,p.y-10);
        }
      }
      else if(p.type==='oapc'){
        badges=badges.filter(b=>b.type!=='bapc');
        if(P.lives<P.maxLives)P.lives++;P.articlesTotal++;score+=50;
        P.immune=false;P.immT=0;P.depT=0; // crowDepT conservé
        P.apcBlock=true;P.apcT=7;
        P.depT=1.0;tryTipOAPC(p.x+p.w/2,p.y-10);
      }
      else if(p.type==='goa'){
        if(P.apcBlock){consume=false;} // continue à défiler pendant APC
        else{
          // Check for paired ND badge
          const ndBadge=badges.find(b=>b.pairedGOA&&Math.abs(b.x-(p.x+(GOAW-BW)/2))<GOAW*2);
          const hasND=!!ndBadge;
          if(hasND){badges=badges.filter(b=>b!==ndBadge);score=Math.max(0,score-20);}
          if(P.lives<P.maxLives)P.lives++;P.articlesTotal++;score+=25;P.depT=1.0;
          // Combined tooltip like tryTipOA style
          seen['goa']=(seen['goa']||0)+1;
          tooltips.push({
            name:'Green OA', text:'+1 article / +25 lecteurs', col:'#86efac',
            line3:hasND?'CC BY-NC-ND  −20 lecteurs':null, col3:'#f87171',
            x:p.x+p.w/2, y:p.y-10, life:1, vy:-45
          });
        }
      }
      else if(p.type==='cou'){
        if(!P.apcBlock){if(P.lives<P.maxLives)P.lives++;P.articlesTotal++;P.immune=true;P.immT=Math.min(10,P.immT+2);P.shieldType='cou';tryTip('cou',p.x+p.w/2,p.y-10);}
        else consume=false;
      }
      else{if(P.lives<P.maxLives)P.lives++;P.articlesTotal++;score+=50;P.immune=true;P.immT=2;P.depT=1.0;}
      if(consume) pickups.splice(i,1);
    }
  }
  // Badges : purement visuels, effet déclenché uniquement via le cadenas OA
}

function drawBg(){
  // Flat pixel sky — 3 horizontal bands
  cx.fillStyle='#1a1040'; cx.fillRect(0,0,W,H);
  
  // Pixel stars — sharp squares, 3 colours, twinkle by toggling
  stars.forEach(s=>{
    const on=Math.sin(s.tw)>0;
    if(!on&&s.r<0.8)return;
    const col=s.r<0.6?'#8899cc':s.r<1.1?'#c8d4ff':'#f0f0f0';
    cx.fillStyle=col;
    const sz=s.r<0.8?1:s.r<1.2?1:2;
    cx.fillRect(Math.floor(s.x),Math.floor(s.y),sz,sz);
  });
}

// ── Draw Luciee ─────────────────────────────────────────────────
function drawLuci(){
  if(loaded<TOTAL_SPRITES)return;
  const now=Date.now()/1000;
  const dw=LW*P.sc,dh=LH*P.sc;
  const cx2=P.x+dw/2,cy2=P.y+dh/2;

  // Pick sprite + per-frame scale
  // Hit/deposit/crow-reaction sprites have more padding → draw 30% bigger so the
  // character body stays visually the same size across all scenes.
  // Jump takes priority over deposit/crow when airborne (but hit stays first for feedback).
  let spr, sprScale=1;
  if(P.hitFlash>.2){
    spr=IMG[P.hitFrame===0?'hit1':'hit2']; sprScale=1.30;
  } else if(P.depT>0){
    // dépôt interrompt jump visuellement
    const f=Math.min(4,Math.floor(P.depFrame));
    spr=IMG['dep'+(f+1)]; sprScale=1.30;
  } else if(P.crowDepT>0){
    const f=Math.min(4,Math.floor(P.crowDepFr));
    spr=IMG['lc'+(f+1)]; sprScale=1.30;
  } else if(P.y<GY-LH*P.sc-3){
    spr=IMG.jump;
  } else {
    spr=IMG[P.rFrame%2===0?'run1':'run2'];
    if(mode!=='play')spr=IMG.idle;
  }

  cx.save();
  cx.imageSmoothingEnabled=false;

  // Glow halo (only immunity)
  if(P.immune&&false){  // disabled - shield handles this
    const pulse=.5+.5*Math.sin(now*4);
    const grd=cx.createRadialGradient(cx2,cy2,2,cx2,cy2,36+pulse*14);
    grd.addColorStop(0,`rgba(255,230,80,${.35+pulse*.15})`);grd.addColorStop(.5,'rgba(255,200,40,.12)');grd.addColorStop(1,'rgba(255,160,0,0)');
    cx.fillStyle=grd;cx.beginPath();cx.arc(cx2,cy2,36+pulse*14,0,Math.PI*2);cx.fill();
  }

  // Bouclier (sprite animé centré sur Luci) — Couperin=bleu, OA=vert
  if(P.immune){
    const skey=P.shieldType==='oa'?'boa'+(boaFr+1):'bc'+(shieldFr+1);
    const simg=IMG[skey];
    if(simg&&simg.complete){
      const sw=96,sh=96;
      cx.save();
      cx.imageSmoothingEnabled=false;
      const alpha=P.immT<0.4?P.immT/0.4:1;
      cx.globalAlpha=alpha;
      cx.drawImage(simg, cx2-sw/2, cy2-sh/2, sw, sh);
      cx.restore();
    }
  }

  // CC BY: subtle sparkle only via particles (no aura ring)

  // Draw sprite — scale up "action" frames keeping center fixed
  if(spr&&spr.complete){
    const sdw=dw*sprScale, sdh=dh*sprScale;
    cx.drawImage(spr, P.x-(sdw-dw)/2, P.y-(sdh-dh)/2, sdw, sdh);
  }
  cx.restore();
}

function drawArch(p){

  const key=p.d.keys[p.fr];

}

// ── Draw Green OA ─────────────────────────────────────────────
function drawGOA(p){

  if(p.ftick>1/8){p.ftick=0;p.fr=(p.fr+1)%5;}
  const img=IMG['goa'+(p.fr+1)];
  if(img&&img.complete){
    const pulse=.8+.2*Math.sin(p.t*3);
    // Pixel sparkles — green
    const tick=Math.floor(p.t*6)%4;
    const cx2=p.x+p.w/2;
    [[0,-1],[1,0],[0,1],[-1,0]].forEach(([dx,dy],i)=>{
      if((i+tick)%4<2){
        cx.fillStyle='#50e870';
        cx.fillRect(Math.floor(cx2+dx*32)-1,Math.floor(p.y+p.h/2+dy*28)-1,2,2);
      }
    });
    cx.drawImage(img,p.x,p.y,p.w,p.h);
  }
}

// ── Draw Couperin ──────────────────────────────────────────────
function drawCouperin(p){
  cx.imageSmoothingEnabled=false;
  p.ftick+=0.016;
  if(p.ftick>1/6){p.ftick=0;p.fr=(p.fr+1)%3;}
  const img=IMG['cou'+(p.fr+1)];
  if(img&&img.complete){
    // Pixel sparkles — blue
    const tick=Math.floor(p.t*5)%2;
    const cx2=p.x+p.w/2,cy2=p.y+p.h/2;
    [[1,1],[-1,1],[1,-1],[-1,-1]].forEach(([dx,dy],i)=>{
      if((i+tick)%2===0){
        cx.fillStyle='#60c8ff';
        cx.fillRect(Math.floor(cx2+dx*36)-1,Math.floor(cy2+dy*30)-1,2,2);
      }
    });
    cx.drawImage(img,p.x,p.y,p.w,p.h);
  }
}

// ── Draw Crow ─────────────────────────────────────────────────
function drawCrow(cr){
  cx.imageSmoothingEnabled=false;
  // Sprites already in correct direction:
  // crow1/2 face LEFT (<) for approach
  // crow_with_article1/2 face RIGHT (>) for retreat — no flip needed
  const keys=cr.phase==='approach'?['cr1','cr2']:['cra1','cra2'];
  const img=IMG[keys[cr.fr%2]];
  if(!img||!img.complete)return;
  cx.drawImage(img,cr.x,cr.y,cr.w,cr.h);
}

// ── Draw badge ────────────────────────────────────────────────
function drawBadge(b){
  cx.imageSmoothingEnabled=false;
  const isCCBY=b.type==='ccby';
  b.ftick+=0.016;
  const keys=isCCBY?BY_KEYS:ND_KEYS;
  if(b.ftick>1/6){b.ftick=0;b.fr=(b.fr+1)%keys.length;}
  const img=IMG[keys[b.fr]];
  if(img&&img.complete){
    const fy=b.y+Math.sin(b.t*2)*5;
    cx.drawImage(img,b.x,fy,b.w,b.h);
  }
}

// ── Main loop ─────────────────────────────────────────────────
function loop(ts){
  update(ts);
  if(mode==='intro'){drawIntro();requestAnimationFrame(loop);return;}
  drawBg();drawGround();
  obstacles.forEach(drawPub);
  pickups.forEach(p=>{
    if(p.type==='arch')drawArch(p);
    else if(p.type==='oapc')drawOAPC(p);
    else if(p.type==='oa')drawOA(p);
    else if(p.type==='goa')drawGOA(p);
    else if(p.type==='cou')drawCouperin(p);
  });
  crows.forEach(drawCrow);
  badges.forEach(b=>b.type==='bapc'?drawBadgeAPC(b):drawBadge(b));
  drawParts();
  drawTooltips(lastDt);
  if(mode==='play'||mode==='over')drawLuci();
  _drawMenuBtn();
  drawHUD();
  if(mode==='start')drawStart();
  if(mode==='over')drawOver();
  requestAnimationFrame(loop);
}

// Phone portrait animation — rAF loop, only runs when overlay is visible
let phoneRafId=null, phoneLastT=0;
function phoneLoop(ts){
  const pc=document.getElementById('phoneCanvas');
  if(!pc){phoneRafId=null;return;}
  if(document.getElementById('rotate-msg').style.display==='none'&&
     !window.matchMedia('(orientation:portrait)').matches){
    phoneRafId=null; return; // stop when not in portrait
  }
  const dt=(ts-phoneLastT)/1000; phoneLastT=ts;
  phoneTick+=dt;
  if(phoneTick>1/12){phoneTick=0;phoneFr=(phoneFr+1)%17;}
  const pctx=pc.getContext('2d');
  const img=IMG['phone_ss'];
  if(img&&img.complete){
    const fw=288,fh=288,dw=144,dh=144;
    pctx.clearRect(0,0,dw,dh);
    pctx.imageSmoothingEnabled=false;
    pctx.drawImage(img,phoneFr*fw,0,fw,fh,0,0,dw,dh);
  }
  phoneRafId=requestAnimationFrame(phoneLoop);
}
function startPhoneAnim(){
  if(!phoneRafId){phoneLastT=performance.now();phoneRafId=requestAnimationFrame(phoneLoop);}
}
// Start/stop based on orientation
window.addEventListener('orientationchange',()=>{
  if(window.screen.orientation&&window.screen.orientation.type.startsWith('portrait'))startPhoneAnim();
});
window.matchMedia('(orientation:portrait)').addEventListener('change',e=>{
  if(e.matches){
    startPhoneAnim();
  } else {
    // Rotated back to landscape: go to start screen
    if(mode==='play'||mode==='over'||mode==='intro'){mode='start';}
  }
});
// Start immediately if already portrait
if(window.matchMedia('(orientation:portrait)').matches) startPhoneAnim();






// Canvas menu button for mobile
var _menuBtn={x:W-60,y:6,w:52,h:20,active:false};
function _drawMenuBtn(){
  if(!window.matchMedia('(pointer:coarse)').matches) return;
  if(mode!=='play'&&mode!=='over') return;
  cx.save();
  cx.fillStyle='rgba(255,255,255,0.13)';
  cx.beginPath();
  cx.roundRect(_menuBtn.x,_menuBtn.y,_menuBtn.w,_menuBtn.h,5);
  cx.fill();
  cx.strokeStyle='rgba(255,255,255,0.28)';cx.lineWidth=1;
  cx.beginPath();
  cx.roundRect(_menuBtn.x,_menuBtn.y,_menuBtn.w,_menuBtn.h,5);
  cx.stroke();
  cx.fillStyle='rgba(255,255,255,0.70)';
  cx.font=`bold 9px 'Space Mono',monospace`;
  cx.textAlign='center';
  cx.fillText('menu',_menuBtn.x+_menuBtn.w/2,_menuBtn.y+13);
  cx.restore();
}
C.addEventListener('pointerdown',function(e){
  if(!window.matchMedia('(pointer:coarse)').matches) return;
  if(mode!=='play'&&mode!=='over') return;
  var rect=C.getBoundingClientRect();
  var scaleX=W/rect.width, scaleY=H/rect.height;
  var tx=(e.clientX-rect.left)*scaleX;
  var ty=(e.clientY-rect.top)*scaleY;
  if(tx>=_menuBtn.x&&tx<=_menuBtn.x+_menuBtn.w&&ty>=_menuBtn.y&&ty<=_menuBtn.y+_menuBtn.h){
    e.stopPropagation();
    mode='start';
  }
},{capture:true});
mkStars();resetP();requestAnimationFrame(loop);
