<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:#060a1e;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Space Mono',monospace;color:#fff;overflow:hidden;padding:12px}

  <style>
  #rotate-msg{display:none;position:fixed;inset:0;background:#060a1e;z-index:999;

    gap:16px;padding:20px}
  #rotate-msg canvas#phoneCanvas{image-rendering:pixelated;image-rendering:crisp-edges;}
  @media(max-width:960px){#wrap{width:100vw;max-width:100%;}}

    html,body{padding:0;margin:0;min-height:unset;height:100dvh;justify-content:center;}
    #wrap{width:100vw;max-width:100vw;border-radius:0;box-shadow:none;margin:0;padding:0;}
    canvas#c{border-radius:0;width:100vw;height:100dvh;display:block;}
    p.hint{display:none;}
  }
  @media(orientation:portrait){#rotate-msg{display:flex}#wrap,p.hint{display:none}}
  </style>
</head>
